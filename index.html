<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アルミ多条割スリッターライン 3Dシミュレーター</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root{
    --bg:#11151a;
    --panel:rgba(15,20,26,.88);
    --panel-line:#273340;
    --txt:#d7e1ea;
    --sub:#8aa0b4;
    --acc:#4fc6ff;
    --val:#62f0c4;
    --ok:#3ad98c;
    --warn:#f0b429;
    --info:#5b9bff;
    --stop:#ff6b5e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
    font-family:"Segoe UI","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;color:var(--txt);}
  #scene{position:fixed;inset:0;}
  canvas{display:block;}

  /* ===== 操作盤パネル ===== */
  #panel{
    position:fixed;left:14px;top:14px;width:304px;max-height:calc(100vh - 28px);
    overflow-y:auto;background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--panel-line);border-radius:10px;
    box-shadow:0 8px 30px rgba(0,0,0,.45);padding:14px 16px 16px;z-index:10;
  }
  #panel::-webkit-scrollbar{width:6px;}
  #panel::-webkit-scrollbar-thumb{background:#33414f;border-radius:3px;}

  .panel-title{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;
    letter-spacing:.04em;padding-bottom:10px;border-bottom:1px solid var(--panel-line);}
  .panel-title i{color:var(--acc);font-size:15px;}
  .panel-title small{display:block;font-size:10px;font-weight:400;color:var(--sub);letter-spacing:.12em;}

  .sec{margin-top:13px;}
  .sec-h{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--sub);
    letter-spacing:.18em;margin-bottom:8px;}
  .sec-h i{color:var(--acc);width:13px;text-align:center;}
  .sec-h::after{content:"";flex:1;height:1px;background:var(--panel-line);}

  /* 状態カード */
  .status-card{background:#0a0e13;border:1px solid var(--panel-line);border-radius:8px;
    padding:10px 12px;display:flex;align-items:center;gap:12px;}
  .led{width:11px;height:11px;border-radius:50%;flex:none;background:#444;
    box-shadow:0 0 0 3px rgba(255,255,255,.04);transition:background .3s,box-shadow .3s;}
  .led.ok{background:var(--ok);box-shadow:0 0 9px var(--ok);}
  .led.warn{background:var(--warn);box-shadow:0 0 9px var(--warn);}
  .led.info{background:var(--info);box-shadow:0 0 9px var(--info);}
  .led.stop{background:var(--stop);box-shadow:0 0 9px var(--stop);}
  .status-main{flex:1;min-width:0;}
  #statusText{font-size:12px;letter-spacing:.05em;}
  .speed-big{font-family:Consolas,"Cascadia Mono",monospace;font-size:24px;color:var(--val);
    line-height:1.1;font-weight:600;}
  .speed-big small{font-size:11px;color:var(--sub);font-weight:400;margin-left:4px;}

  /* ボタン */
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    padding:9px 0;border:1px solid var(--panel-line);border-radius:7px;cursor:pointer;
    background:#1a232d;color:var(--txt);font-size:13px;font-weight:600;letter-spacing:.06em;
    transition:background .15s,border-color .15s;}
  .btn:hover{background:#22303d;border-color:#3a4c5d;}
  .btn.running{border-color:#5a3030;background:#2a1c1c;color:#ffb0a8;}
  .btn.running:hover{background:#352222;}

  /* スライダー */
  .slider-row{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;
    color:var(--sub);margin-bottom:5px;}
  .slider-row b{font-family:Consolas,monospace;color:var(--val);font-size:13px;font-weight:600;}
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;
    background:#2a3642;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;
    border-radius:50%;background:var(--acc);border:2px solid #0d1117;cursor:pointer;
    box-shadow:0 0 6px rgba(79,198,255,.5);}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;
    background:var(--acc);border:2px solid #0d1117;cursor:pointer;}

  /* 条数セグメント */
  .seg{display:flex;gap:5px;}
  .seg button{flex:1;padding:7px 0;border:1px solid var(--panel-line);border-radius:6px;
    background:#161e26;color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;
    font-family:Consolas,monospace;transition:all .15s;}
  .seg button:hover{border-color:#3a4c5d;color:var(--txt);}
  .seg button.active{background:#11364a;border-color:var(--acc);color:var(--acc);}

  /* 計測値 */
  .ro{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:11.5px;color:var(--sub);}
  .ro i{width:14px;text-align:center;color:#5a7186;font-size:11px;}
  .ro span{flex:1;}
  .ro b{font-family:Consolas,"Cascadia Mono",monospace;color:var(--val);font-size:13px;
    font-weight:600;letter-spacing:.02em;}
  .ro b small{color:var(--sub);font-size:10px;font-weight:400;margin-left:3px;}
  .prog{height:6px;background:#1a232d;border-radius:3px;overflow:hidden;margin-top:4px;}
  .prog>div{height:100%;width:0%;background:linear-gradient(90deg,#2e8fc4,var(--acc));
    border-radius:3px;transition:width .4s;}

  /* カメラグリッド */
  .cam-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .cam-grid button{display:flex;align-items:center;gap:7px;padding:7px 10px;
    border:1px solid var(--panel-line);border-radius:6px;background:#161e26;color:var(--txt);
    font-size:11.5px;cursor:pointer;transition:all .15s;}
  .cam-grid button:hover{background:#1f2b37;border-color:#3a4c5d;}
  .cam-grid button i{color:var(--acc);width:13px;text-align:center;font-size:11px;}
  .cam-grid button.wide{grid-column:1 / -1;}

  /* トグルスイッチ */
  .toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;
    color:var(--txt);padding:3px 0;}
  .toggle-row i{color:#5a7186;margin-right:7px;font-size:11px;}
  .switch{position:relative;width:36px;height:19px;flex:none;}
  .switch input{opacity:0;width:0;height:0;}
  .switch .knob{position:absolute;inset:0;background:#2a3642;border-radius:10px;cursor:pointer;
    transition:background .2s;}
  .switch .knob::before{content:"";position:absolute;left:2px;top:2px;width:15px;height:15px;
    border-radius:50%;background:#8aa0b4;transition:transform .2s,background .2s;}
  .switch input:checked + .knob{background:#11364a;}
  .switch input:checked + .knob::before{transform:translateX(17px);background:var(--acc);}

  /* 操作ヘルプ */
  #help{position:fixed;right:14px;bottom:12px;z-index:10;font-size:10.5px;color:var(--sub);
    background:rgba(13,17,22,.7);border:1px solid var(--panel-line);border-radius:6px;
    padding:6px 11px;letter-spacing:.04em;backdrop-filter:blur(6px);}
  #help i{color:var(--acc);margin:0 3px 0 9px;}
  #help i:first-child{margin-left:0;}
</style>
</head>
<body>

<div id="scene"></div>

<div id="panel">
  <div class="panel-title">
    <i class="fa-solid fa-industry"></i>
    <div>アルミ多条割スリッターライン<small>MULTI-STRAND SLITTING LINE</small></div>
  </div>

  <!-- 状態 -->
  <div class="sec">
    <div class="status-card">
      <div class="led" id="statusLed"></div>
      <div class="status-main">
        <div id="statusText">起動中</div>
        <div class="speed-big"><span id="roSpeed">0</span><small>m/min</small></div>
      </div>
    </div>
  </div>

  <!-- 操業 -->
  <div class="sec">
    <div class="sec-h"><i class="fa-solid fa-sliders"></i>操業操作</div>
    <button class="btn" id="btnRun"><i class="fa-solid fa-stop"></i><span>ライン停止</span></button>
    <div style="margin-top:11px;">
      <div class="slider-row"><span>ライン速度設定</span><b><span id="speedVal">80</span> m/min</b></div>
      <input type="range" id="rngSpeed" min="10" max="180" step="5" value="80">
    </div>
  </div>

  <!-- 設定 -->
  <div class="sec">
    <div class="sec-h"><i class="fa-solid fa-table-columns"></i>スリット条数</div>
    <div class="seg" id="strandGroup">
      <button data-n="2">2</button>
      <button data-n="3">3</button>
      <button data-n="4" class="active">4</button>
      <button data-n="5">5</button>
      <button data-n="6">6</button>
    </div>
    <div class="ro" style="margin-top:7px;">
      <i class="fa-solid fa-ruler-horizontal"></i><span>母材幅 / 条幅</span>
      <b>1200<small>mm</small> / <span id="roStrandW">272</span><small>mm</small></b>
    </div>
  </div>

  <!-- 計測 -->
  <div class="sec">
    <div class="sec-h"><i class="fa-solid fa-gauge-high"></i>計測値</div>
    <div class="ro"><i class="fa-solid fa-arrow-rotate-left"></i><span>アンコイラ残径</span>
      <b><span id="roUnc">2100</span><small>mm</small></b></div>
    <div class="ro"><i class="fa-solid fa-arrow-rotate-right"></i><span>リコイラ巻径</span>
      <b><span id="roRec">560</span><small>mm</small></b></div>
    <div class="ro"><i class="fa-solid fa-gauge"></i><span>ライン張力</span>
      <b><span id="roTen">0</span><small>kN</small></b></div>
    <div class="ro"><i class="fa-solid fa-up-right-and-down-left-from-center"></i><span>通板長(累計)</span>
      <b><span id="roLen">0</span><small>m</small></b></div>
    <div class="ro" style="margin-top:3px;"><i class="fa-solid fa-circle-half-stroke"></i>
      <span>コイル消化率</span><b><span id="roProg">0</span><small>%</small></b></div>
    <div class="prog"><div id="coilProg"></div></div>
  </div>

  <!-- カメラ・表示 -->
  <div class="sec">
    <div class="sec-h"><i class="fa-solid fa-video"></i>カメラ・表示</div>
    <div class="cam-grid">
      <button class="wide" data-cam="all"><i class="fa-solid fa-expand"></i>ライン全景</button>
      <button data-cam="unc"><i class="fa-solid fa-arrow-rotate-left"></i>アンコイラ</button>
      <button data-cam="slit"><i class="fa-solid fa-scissors"></i>スリッター</button>
      <button data-cam="loop"><i class="fa-solid fa-arrows-down-to-line"></i>ルーパー</button>
      <button data-cam="md"><i class="fa-solid fa-grip-lines"></i>MDロール</button>
      <button data-cam="rec"><i class="fa-solid fa-arrow-rotate-right"></i>リコイラ</button>
    </div>
    <div class="toggle-row" style="margin-top:10px;">
      <span><i class="fa-solid fa-tags"></i>機器名ラベル表示</span>
      <label class="switch"><input type="checkbox" id="chkLabels" checked><span class="knob"></span></label>
    </div>
    <div class="toggle-row">
      <span><i class="fa-solid fa-route"></i>パスライン表示</span>
      <label class="switch"><input type="checkbox" id="chkPath"><span class="knob"></span></label>
    </div>
  </div>
</div>

<div id="help">
  <i class="fa-solid fa-arrows-up-down-left-right"></i>左ドラッグ:回転
  <i class="fa-solid fa-magnifying-glass-plus"></i>ホイール:ズーム
  <i class="fa-solid fa-hand"></i>右ドラッグ:移動
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
(function(){

/* =========================================================
 * 定数 — ライン緒元
 * =======================================================*/
const PASS_Y   = 1.30;            // パスライン高さ [m]
const STRIP_W  = 1.20;            // 母材幅 [m]
const TRIM_W   = 0.05;            // 耳屑幅(片側) [m]
const EFF_W    = STRIP_W - TRIM_W*2;   // 製品有効幅
const UNC_X    = -14.0, UNC_Y = 1.55;  // アンコイラ中心
const REC_X    =   8.6, REC_Y = 1.55;  // リコイラ中心
const SLIT_X   =  -6.0;                // スリッターヘッド
const LOOP_IN  =  -3.5, LOOP_OUT = 1.9;// ルーパー出入りロール
const R_MANDREL= 0.25;
const RU_MAX = 1.05, RU_MIN = 0.33;    // アンコイラ径範囲
const RR_MIN = 0.28, RR_MAX = 1.03;    // リコイラ径範囲
const H_VIS  = 0.020;                  // 見かけ板厚(径変化の体感速度)
const UV_SCALE = 2.0;                  // ストリップテクスチャ 1リピート長 [m]
const ACCEL = 0.40, DECEL = 0.55;      // 速度ランプ [m/s2]
const ENTRY_N = 54, STRAND_N = 96, TRIM_N = 26;  // リボン分割数

/* MDロール(ブライドル式テンション) — 上下交互配置でS字に巻き付け
 * side: 'under' = 帯上方のロール(帯は下面に接触), 'over' = 帯下方のロール */
const MD_GAP = 0.30, MD_R = 0.17;
const MD_ROLLS = [
  { x: 2.55, cy: PASS_Y + MD_GAP, r: MD_R, side:'under' },
  { x: 3.20, cy: PASS_Y - MD_GAP, r: MD_R, side:'over'  },
  { x: 3.85, cy: PASS_Y + MD_GAP, r: MD_R, side:'under' },
];
const mdContactY = (m)=> m.side==='under' ? m.cy - m.r : m.cy + m.r;
const DEFL_X = 5.8, DEFL_CY = PASS_Y + 0.15, DEFL_R = 0.15; // デフレクターロール
const SEP_X  = 7.3;                                          // セパレーター

/* =========================================================
 * 状態
 * =======================================================*/
const st = {
  v: 0,                       // 現在速度 [m/s]
  target: 80/60,              // 設定速度 [m/s]
  paused: false,
  state: "RUN",               // RUN / DECEL / CHANGE
  tChange: 0, swapped: false,
  ru: RU_MAX, rr: RR_MIN,
  rsL: 0.13, rsR: 0.13,       // 耳屑巻取径
  len: 0,                     // 累計通板長 [m]
  N: 4,                       // 条数
  texOfs: 0,
};

/* =========================================================
 * 基本セットアップ
 * =======================================================*/
const container = document.getElementById("scene");
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.18;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1b222b);
scene.fog = new THREE.Fog(0x1b222b, 40, 92);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 220);

/* ---- 環境マップ(金属の映り込み用に明るい工場環境をPMREM化) ---- */
(function buildEnvironment(){
  const env = new THREE.Scene();
  const sphereGeo = new THREE.SphereGeometry(50, 24, 16);
  const pos = sphereGeo.attributes.position;
  const colors = new Float32Array(pos.count * 3);
  const cTop = new THREE.Color(0xcfe2f4), cBot = new THREE.Color(0x39404a);
  const tmp = new THREE.Color();
  for(let i=0;i<pos.count;i++){
    const t = THREE.MathUtils.clamp(pos.getY(i)/50*0.5+0.5, 0, 1);
    tmp.copy(cBot).lerp(cTop, t);
    colors[i*3]=tmp.r; colors[i*3+1]=tmp.g; colors[i*3+2]=tmp.b;
  }
  sphereGeo.setAttribute("color", new THREE.BufferAttribute(colors,3));
  env.add(new THREE.Mesh(sphereGeo, new THREE.MeshBasicMaterial({side:THREE.BackSide, vertexColors:true})));
  // 天井灯(環境反射用)
  const lampMat = new THREE.MeshBasicMaterial({color:0xffffff});
  for(const x of [-24,-16,-8,0,8,16,24]) for(const z of [-5,5]){
    const lamp = new THREE.Mesh(new THREE.PlaneGeometry(5,1.6), lampMat);
    lamp.position.set(x, 28, z); lamp.rotation.x = Math.PI/2;
    env.add(lamp);
  }
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(env, 0.04).texture;
  pmrem.dispose();
})();

/* ---- 照明(明るい工場) ---- */
scene.add(new THREE.HemisphereLight(0xbcd6ef, 0x3a3832, 0.85));
const sun = new THREE.DirectionalLight(0xfff3e2, 1.45);
sun.position.set(10, 19, 9);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.left=-24; sun.shadow.camera.right=18;
sun.shadow.camera.top=14;   sun.shadow.camera.bottom=-14;
sun.shadow.camera.far=55;   sun.shadow.bias=-0.0006;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xb8d2ee, 0.35);
fill.position.set(-12, 10, -10);
scene.add(fill);
const back = new THREE.DirectionalLight(0xdfe9f4, 0.25);
back.position.set(2, 8, -14);
scene.add(back);

/* =========================================================
 * カメラコントロール(軌道+パン+プリセットトゥイーン)
 * =======================================================*/
class OrbitCam{
  constructor(cam, dom){
    this.cam=cam; this.dom=dom;
    this.target=new THREE.Vector3(-2.5,1.3,0);
    this.r=20; this.theta=0.5; this.phi=1.12;
    this.minR=3.5; this.maxR=52; this.minPhi=0.12; this.maxPhi=1.52;
    this._btn=-1; this._px=0; this._py=0; this.tween=null;
    dom.addEventListener("pointerdown",e=>{
      this._btn=e.button; this._px=e.clientX; this._py=e.clientY;
      dom.setPointerCapture(e.pointerId);
    });
    dom.addEventListener("pointermove",e=>{
      if(this._btn<0) return;
      const dx=e.clientX-this._px, dy=e.clientY-this._py;
      this._px=e.clientX; this._py=e.clientY;
      if(this._btn===0){
        this.theta-=dx*0.005;
        this.phi=THREE.MathUtils.clamp(this.phi-dy*0.005,this.minPhi,this.maxPhi);
      }else{
        this._pan(dx,dy);
      }
      this.tween=null;
    });
    dom.addEventListener("pointerup",()=>{this._btn=-1;});
    dom.addEventListener("wheel",e=>{
      e.preventDefault();
      this.r=THREE.MathUtils.clamp(this.r*(e.deltaY>0?1.1:0.9),this.minR,this.maxR);
      this.tween=null;
    },{passive:false});
    dom.addEventListener("contextmenu",e=>e.preventDefault());
  }
  _pan(dx,dy){
    const s=this.r*0.0012;
    const fwd=new THREE.Vector3().subVectors(this.target,this.cam.position).normalize();
    const right=new THREE.Vector3().crossVectors(fwd,this.cam.up).normalize();
    const up=new THREE.Vector3().crossVectors(right,fwd).normalize();
    this.target.addScaledVector(right,-dx*s).addScaledVector(up,dy*s);
  }
  flyTo(tx,ty,tz,r,theta,phi){
    this.tween={k:0,
      f:{x:this.target.x,y:this.target.y,z:this.target.z,r:this.r,th:this.theta,ph:this.phi},
      t:{x:tx,y:ty,z:tz,r:r,th:theta,ph:phi}};
  }
  update(dt){
    if(this.tween){
      const tw=this.tween;
      tw.k=Math.min(tw.k+dt/0.9,1);
      const e=tw.k<0.5 ? 2*tw.k*tw.k : 1-Math.pow(-2*tw.k+2,2)/2;
      this.target.set(
        THREE.MathUtils.lerp(tw.f.x,tw.t.x,e),
        THREE.MathUtils.lerp(tw.f.y,tw.t.y,e),
        THREE.MathUtils.lerp(tw.f.z,tw.t.z,e));
      this.r    =THREE.MathUtils.lerp(tw.f.r ,tw.t.r ,e);
      this.theta=THREE.MathUtils.lerp(tw.f.th,tw.t.th,e);
      this.phi  =THREE.MathUtils.lerp(tw.f.ph,tw.t.ph,e);
      if(tw.k>=1) this.tween=null;
    }
    const sp=Math.sin(this.phi);
    this.cam.position.set(
      this.target.x + this.r*sp*Math.sin(this.theta),
      this.target.y + this.r*Math.cos(this.phi),
      this.target.z + this.r*sp*Math.cos(this.theta));
    this.cam.lookAt(this.target);
  }
}
const controls = new OrbitCam(camera, renderer.domElement);

/* =========================================================
 * テクスチャ生成(Canvas)
 * =======================================================*/
function canvasTex(w,h,draw){
  const c=document.createElement("canvas"); c.width=w; c.height=h;
  draw(c.getContext("2d"),w,h);
  const t=new THREE.CanvasTexture(c);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.anisotropy=renderer.capabilities.getMaxAnisotropy();
  t.encoding=THREE.sRGBEncoding;
  return t;
}

/* ストリップ表面(圧延目+輝度ムラ) */
const stripTex = canvasTex(512,128,(g,w,h)=>{
  g.fillStyle="#d8dde2"; g.fillRect(0,0,w,h);
  for(let i=0;i<90;i++){
    const y=Math.random()*h, len=40+Math.random()*200;
    g.fillStyle=`rgba(${Math.random()<0.5?"90,100,110":"255,255,255"},${0.03+Math.random()*0.06})`;
    g.fillRect(Math.random()*w,y,len,1+Math.random()*1.5);
  }
  for(let i=0;i<5;i++){
    const x=Math.random()*w;

function addBox(w,h,d,mat,x,y,z,parent,shadow){

/* 軸Z向き円筒(回転体はすべてZ軸回転で統一) */
function addCylZ(r,len,mats,x,y,z,parent,seg){

/* =========================================================
 * 接線ジオメトリ — コイル外周(円)から次のロールへ引く接線
 *   コイル中心C, 半径R から外部点P へ。sign で上側/下側の接線を選択。
 *   返り値: 接点(x,y)と中心から見た角度a。
 * =======================================================*/
function tangentPoint(cx,cy,R,px,py,sign){
  const dx=px-cx, dy=py-cy;
  const d=Math.hypot(dx,dy)||1e-4;
  const base=Math.atan2(dy,dx);
  const off=Math.acos(THREE.MathUtils.clamp(R/d,-1,1));
  const a=base + sign*off;
  return { x:cx+R*Math.cos(a), y:cy+R*Math.sin(a), a };
}
/* コイル外周に沿う円弧点列(皮を剥ぐ/巻き付く見た目) a0→a1 */
function arcPoints(cx,cy,R,a0,a1,n,z,out){
  for(let i=0;i<n;i++){
    const a=THREE.MathUtils.lerp(a0,a1,i/(n-1));
    out.push(V3(cx+R*Math.cos(a), cy+R*Math.sin(a), z));
  }
}

/* =========================================================
 * リボンストリップ(動的ジオメトリ)
 * =======================================================*/
class Ribbon{
  constructor(width,count,material){
    this.w=width; this.n=count;
    const g=new THREE.BufferGeometry();
    this.pos=new Float32Array(count*6);
    this.nor=new Float32Array(count*6);
    this.uv =new Float32Array(count*4);
    const idx=[];
    for(let i=0;i<count-1;i++){const a=i*2; idx.push(a,a+1,a+2, a+1,a+3,a+2);}
    g.setIndex(idx);
    g.setAttribute("position",new THREE.BufferAttribute(this.pos,3).setUsage(THREE.DynamicDrawUsage));
    g.setAttribute("normal",  new THREE.BufferAttribute(this.nor,3).setUsage(THREE.DynamicDrawUsage));
    g.setAttribute("uv",      new THREE.BufferAttribute(this.uv ,2).setUsage(THREE.DynamicDrawUsage));
    this.geo=g;
    this.mesh=new THREE.Mesh(g,material);
    this.mesh.castShadow=true;
    this.mesh.frustumCulled=false;
    scene.add(this.mesh);
  }
  update(pts){
    const h=this.w/2; let s=0;
    const n=Math.min(pts.length,this.n);
    for(let i=0;i<n;i++){
      const p=pts[i];
      const pp=pts[Math.max(i-1,0)], pn=pts[Math.min(i+1,n-1)];
      let tx=pn.x-pp.x, ty=pn.y-pp.y;
      const tl=Math.hypot(tx,ty)||1; tx/=tl; ty/=tl;
      let nx=-ty, ny=tx;                       // n = ez × t
      const nl=Math.hypot(nx,ny)||1; nx/=nl; ny/=nl;
      if(i>0) s+=p.distanceTo(pts[i-1]);
      const o=i*6;
      this.pos[o  ]=p.x; this.pos[o+1]=p.y; this.pos[o+2]=p.z-h;
      this.pos[o+3]=p.x; this.pos[o+4]=p.y; this.pos[o+5]=p.z+h;
      this.nor[o  ]=nx;  this.nor[o+1]=ny;  this.nor[o+2]=0;
      this.nor[o+3]=nx;  this.nor[o+4]=ny;  this.nor[o+5]=0;
      const u=s/UV_SCALE, q=i*4;
      this.uv[q]=u; this.uv[q+1]=0; this.uv[q+2]=u; this.uv[q+3]=1;
    }
    this.geo.attributes.position.needsUpdate=true;
    this.geo.attributes.normal.needsUpdate=true;
    this.geo.attributes.uv.needsUpdate=true;
  }
  dispose(){ scene.remove(this.mesh); this.geo.dispose(); }
}

/* ポリラインを等間隔n点にサンプリング(張りのある直線経路用) */
function samplePolyline(pts,n,out){
  out=out||[];
  const lens=[]; let total=0;
  for(let i=0;i<pts.length-1;i++){const l=pts[i].distanceTo(pts[i+1]); lens.push(l); total+=l;}
  let seg=0, segStart=0;
  for(let i=0;i<n;i++){
    const d=total*i/(n-1);
    while(seg<lens.length-1 && d>segStart+lens[seg]){segStart+=lens[seg]; seg++;}
    const t=lens[seg]>0?Math.min((d-segStart)/lens[seg],1):0;
    out.push(new THREE.Vector3().lerpVectors(pts[seg],pts[seg+1],t));
  }
  return out;
}

/* ---- 経路生成 ---- */
const ENTRY_GUIDE = V3(-10.4, PASS_Y+0.02, 0); // 入側ピンチ手前の案内点
const _entryPts=[];
function updateEntryRibbon(){
  _entryPts.length=0;
  const pre=[];
  // コイル外周からの接線で払い出し(中心ではなく外周から皮を剥ぐ)
  const T=tangentPoint(UNC_X,UNC_Y,st.ru, ENTRY_GUIDE.x,ENTRY_GUIDE.y, +1);
  // 接点の手前にわずかな巻き付き弧を付け、コイルに沿わせる
  arcPoints(UNC_X,UNC_Y,st.ru+0.004, T.a+0.85, T.a, 6, 0, pre);
  const path=[
    ...pre,
    V3(ENTRY_GUIDE.x, ENTRY_GUIDE.y, 0),
    V3(-9.72, PASS_Y, 0),
    V3(SLIT_X+0.02, PASS_Y, 0),
  ];
  samplePolyline(path, ENTRY_N, _entryPts);
  entryRibbon.update(_entryPts);
}

function updateStrandRibbon(rib, zc, sag){
  const pts=[];
  // スリッター出側 → ルーパー入りロール(直線)
  for(let j=0;j<6;j++){
    const t=j/5;
    pts.push(V3(THREE.MathUtils.lerp(SLIT_X-0.02,LOOP_IN,t), PASS_Y, zc));
  }
  // ルーパー垂み(放物線)
  for(let j=1;j<=36;j++){
    const t=j/36;
    pts.push(V3(
      THREE.MathUtils.lerp(LOOP_IN,LOOP_OUT,t),
      PASS_Y - sag*4*t*(1-t), zc));
  }
  // MDロール(ブライドル)をS字に巻き付け → デフレクター
  const mid=[ V3(LOOP_OUT, PASS_Y, zc) ];
  for(const m of MD_ROLLS) mid.push(V3(m.x, mdContactY(m), zc));
  mid.push(V3(4.7, PASS_Y, zc));
  mid.push(V3(DEFL_X, DEFL_CY+DEFL_R, zc));     // デフレクター上面に接触
  mid.push(V3(SEP_X, PASS_Y+0.04, zc));         // セパレーター位置
  // リコイラ: コイル外周への接線で巻き取り(中心ではなく外周へ)
  const G=mid[mid.length-1];
  const T=tangentPoint(REC_X,REC_Y,st.rr, G.x,G.y, -1);
  mid.push(V3(T.x, T.y, zc));
  const tail=samplePolyline(mid, 30);
  for(let j=1;j<tail.length;j++) pts.push(tail[j]);
  // 巻き付き弧(コイル外周に沿って吸い込まれる見た目)
  arcPoints(REC_X,REC_Y,st.rr+0.004, T.a, T.a-0.85, 5, zc, pts);
  rib.update(pts);
}

const _trimCurveR=new THREE.CatmullRomCurve3([V3(0,0,0),V3(0,0,0),V3(0,0,0),V3(0,0,0),V3(0,0,0)]);
const _trimCurveL=new THREE.CatmullRomCurve3([V3(0,0,0),V3(0,0,0),V3(0,0,0),V3(0,0,0),V3(0,0,0)]);
function updateTrimRibbon(rib, curve, sw, side, rs){
  const z0=(EFF_W/2+TRIM_W/2)*side;
  // 耳屑: スリッター出側からサイドワインダーへ。外周接線で巻き取り。
  const approach=V3(-4.95, 1.2, sw.z - 0.5*side);
  const T=tangentPoint(sw.x, sw.y, rs, approach.x, approach.y, +1);
  curve.points[0].set(SLIT_X-0.02, PASS_Y, z0);
  curve.points[1].set(-5.2, PASS_Y-0.04, z0+0.3*side);
  curve.points[2].set(-5.05, 1.15, sw.z*0.55);
  curve.points[3].set(approach.x, approach.y, sw.z - 0.18*side);
  curve.points[4].set(T.x, T.y, sw.z);
  rib.update(curve.getPoints(TRIM_N-1));
}

const labelGroup=new THREE.Group(); scene.add(labelGroup);
function makeLabel(text,x,y,z){
  const c=document.createElement("canvas");
  const g=c.getContext("2d");
  const font='600 30px "Segoe UI","Hiragino Sans",Meiryo,sans-serif';
  g.font=font;
  const tw=Math.ceil(g.measureText(text).width);
  c.width=tw+40; c.height=54;
  g.font=font;
  g.fillStyle="rgba(10,15,21,0.82)";
  g.strokeStyle="rgba(79,198,255,0.45)";
  g.lineWidth=2;
  const r=10,w=c.width,h=c.height;
  g.beginPath();
  g.moveTo(r,1); g.lineTo(w-r,1); g.quadraticCurveTo(w-1,1,w-1,r);
  g.lineTo(w-1,h-r); g.quadraticCurveTo(w-1,h-1,w-r,h-1);
  g.lineTo(r,h-1); g.quadraticCurveTo(1,h-1,1,h-r);
  g.lineTo(1,r); g.quadraticCurveTo(1,1,r,1);
  g.closePath(); g.fill(); g.stroke();
  g.fillStyle="#cfe3f2"; g.textBaseline="middle";
  g.fillText(text,20,h/2+1);
  const tex=new THREE.CanvasTexture(c);
  tex.encoding=THREE.sRGBEncoding; tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthTest:true}));
  const scale=0.55;
  sp.scale.set(c.width/c.height*scale, scale, 1);
  sp.position.set(x,y,z);
  labelGroup.add(sp);
}

/* =========================================================
 * 状態機械・アニメーションループ
 * =======================================================*/
function easeIO(t){ return t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; }

function stepLine(dt){
  // 目標速度(状態に応じて0に絞る)
  const tgt=(st.paused||st.state!=="RUN") ? 0 : st.target;
  const dv=tgt-st.v;
  st.v+=THREE.MathUtils.clamp(dv, -DECEL*dt, ACCEL*dt);
  if(Math.abs(st.v)<0.004 && tgt===0) st.v=0;

  // 通板に伴う径変化(断面積保存: dr/dt = ±v·h / 2πr)
  if(st.v>0){
    st.len+=st.v*dt;
    st.ru=Math.max(RU_MIN-0.01, st.ru - st.v*H_VIS/(2*Math.PI*st.ru)*dt);
    st.rr=Math.min(RR_MAX+0.01, st.rr + st.v*H_VIS/(2*Math.PI*st.rr)*dt);
    const dScrap=st.v*0.004/(2*Math.PI);
    st.rsR=Math.min(0.42, st.rsR + dScrap/st.rsR*dt);
    st.rsL=Math.min(0.42, st.rsL + dScrap/st.rsL*dt);
    st.texOfs-=st.v*dt/UV_SCALE;
    stripTex.offset.x=st.texOfs;
  }

  // コイル交換トリガー
  if(st.state==="RUN" && (st.ru<=RU_MIN || st.rr>=RR_MAX)) st.state="DECEL";
  if(st.state==="DECEL" && st.v<=0.004){ st.state="CHANGE"; st.tChange=0; st.swapped=false; }

  // コイル交換シーケンス(コイルカー進入 → 交換 → 退出)
  if(st.state==="CHANGE"){
    st.tChange+=dt;
    const t=st.tChange;
    if(t<1.4){
      coilCar.position.x=THREE.MathUtils.lerp(10.8,REC_X,easeIO(t/1.4));
    }else if(t<2.4){
      coilCar.position.x=REC_X;
      if(!st.swapped && t>1.9){
        st.ru=RU_MAX; st.rr=RR_MIN; st.rsL=0.13; st.rsR=0.13;
        st.swapped=true;
      }
    }else if(t<3.8){
      coilCar.position.x=THREE.MathUtils.lerp(REC_X,10.8,easeIO((t-2.4)/1.4));
    }else{
      coilCar.position.x=10.8;
      st.state="RUN";
    }
  }
}

function updateGeometry(){
  // コイル径反映
  uncGroup.coil.scale.set(st.ru,st.ru,1);
  for(const c of recCoils) c.scale.set(st.rr,st.rr,1);
  scrapR.coil.scale.set(st.rsR,st.rsR,1);
  scrapL.coil.scale.set(st.rsL,st.rsL,1);
  // ストリップ経路
  updateEntryRibbon();
  const sw=EFF_W/st.N;
  for(let i=0;i<strandRibbons.length;i++){
    const sag=1.55 + 0.32*Math.sin(st.len*0.05 + i*1.9) + 0.02*i;
    updateStrandRibbon(strandRibbons[i], strandZ[i], sag);
  }
  updateTrimRibbon(trimRibbonR,_trimCurveR, sw,  1, st.rsR);
  updateTrimRibbon(trimRibbonL,_trimCurveL, sw, -1, st.rsL);
  if(pathLineGroup.visible) rebuildPathLine();
}

function updateSpinners(dt){
  if(st.v<=0) return;
  for(const s of spinners){
    const r=(typeof s.r==="function")?s.r():s.r;
    s.obj.rotation.z += s.dir*(st.v/r)*dt;
  }
}

/* ---- 計器表示(120ms間隔で更新) ---- */
let uiTimer=0;
function updateHUD(dt){
  uiTimer+=dt; if(uiTimer<0.12) return;
  uiTimer=0;
  ui.roSpeed.textContent=Math.round(st.v*60);
  ui.roUnc.textContent=Math.round(st.ru*2000);
  ui.roRec.textContent=Math.round(st.rr*2000);
  ui.roTen.textContent=(st.v>0.004 ? (8 + st.v*9).toFixed(1) : "0.0");
  ui.roLen.textContent=Math.round(st.len).toLocaleString();
  const prog=THREE.MathUtils.clamp(
    (RU_MAX*RU_MAX-st.ru*st.ru)/(RU_MAX*RU_MAX-RU_MIN*RU_MIN),0,1);
  ui.roProg.textContent=Math.round(prog*100);
  ui.prog.style.width=(prog*100).toFixed(1)+"%";

  let text,cls;
  const tgt=(st.paused||st.state!=="RUN")?0:st.target;
  if(st.state==="CHANGE"){ text="コイル交換中"; cls="info"; }
  else if(st.state==="DECEL"){ text="コイル交換準備 ─ 減速中"; cls="warn"; }
  else if(st.paused && st.v<=0.004){ text="ライン停止"; cls="stop"; }
  else if(st.v<tgt-0.01){ text="加速中"; cls="warn"; }
  else if(st.v>tgt+0.01){ text="減速中"; cls="warn"; }
  else if(st.v>0.004){ text="定常運転中"; cls="ok"; }
  else { text="ライン停止"; cls="stop"; }
  ui.status.textContent=text;
  ui.led.className="led "+cls;
}

/* ---- メインループ ---- */
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  stepLine(dt);
  updateSpinners(dt);
  updateGeometry();
  updateHUD(dt);
  controls.update(dt);
  renderer.render(scene,camera);
}

window.addEventListener("resize",()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
window.addEventListener("keydown",e=>{
  if(e.code==="Space" && document.activeElement.tagName!=="INPUT"){
    e.preventDefault(); ui.btnRun.click();
  }
});

animate();
