<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アルミ多条割スリッターライン 3Dシミュレーター</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  :root{
    --bg:#11151a; --panel:rgba(15,20,26,.88); --panel-line:#273340;
    --txt:#d7e1ea; --sub:#8aa0b4; --acc:#4fc6ff; --val:#62f0c4;
    --ok:#3ad98c; --warn:#f0b429; --info:#5b9bff; --stop:#ff6b5e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
    font-family:"Segoe UI","Hiragino Sans","Noto Sans JP",Meiryo,sans-serif;color:var(--txt);}
  #scene{position:fixed;inset:0;}
  canvas{display:block;}
  #panel{position:fixed;left:14px;top:14px;width:304px;max-height:calc(100vh - 28px);
    overflow-y:auto;background:var(--panel);backdrop-filter:blur(10px);
    border:1px solid var(--panel-line);border-radius:10px;
    box-shadow:0 8px 30px rgba(0,0,0,.45);padding:14px 16px 16px;z-index:10;}
  #panel::-webkit-scrollbar{width:6px;}
  #panel::-webkit-scrollbar-thumb{background:#33414f;border-radius:3px;}
  .panel-title{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;
    letter-spacing:.04em;padding-bottom:10px;border-bottom:1px solid var(--panel-line);}
  .panel-title i{color:var(--acc);font-size:15px;}
  .panel-title small{display:block;font-size:10px;font-weight:400;color:var(--sub);letter-spacing:.12em;}
  .sec{margin-top:13px;}
  .sec-h{display:flex;align-items:center;gap:7px;font-size:10.5px;color:var(--sub);
    letter-spacing:.18em;margin-bottom:8px;}
  .sec-h i{color:var(--acc);width:13px;text-align:center;}
  .sec-h::after{content:"";flex:1;height:1px;background:var(--panel-line);}
  .status-card{background:#0a0e13;border:1px solid var(--panel-line);border-radius:8px;
    padding:10px 12px;display:flex;align-items:center;gap:12px;}
  .led{width:11px;height:11px;border-radius:50%;flex:none;background:#444;
    box-shadow:0 0 0 3px rgba(255,255,255,.04);transition:background .3s,box-shadow .3s;}
  .led.ok{background:var(--ok);box-shadow:0 0 9px var(--ok);}
  .led.warn{background:var(--warn);box-shadow:0 0 9px var(--warn);}
  .led.info{background:var(--info);box-shadow:0 0 9px var(--info);}
  .led.stop{background:var(--stop);box-shadow:0 0 9px var(--stop);}
  .status-main{flex:1;min-width:0;}
  #statusText{font-size:12px;letter-spacing:.05em;}
  .speed-big{font-family:Consolas,"Cascadia Mono",monospace;font-size:24px;color:var(--val);
    line-height:1.1;font-weight:600;}
  .speed-big small{font-size:11px;color:var(--sub);font-weight:400;margin-left:4px;}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    padding:9px 0;border:1px solid var(--panel-line);border-radius:7px;cursor:pointer;
    background:#1a232d;color:var(--txt);font-size:13px;font-weight:600;letter-spacing:.06em;
    transition:background .15s,border-color .15s;}
  .btn:hover{background:#22303d;border-color:#3a4c5d;}
  .btn.running{border-color:#5a3030;background:#2a1c1c;color:#ffb0a8;}
  .btn.running:hover{background:#352222;}
  .slider-row{display:flex;align-items:center;justify-content:space-between;font-size:11.5px;
    color:var(--sub);margin-bottom:5px;}
  .slider-row b{font-family:Consolas,monospace;color:var(--val);font-size:13px;font-weight:600;}
  input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;
    background:#2a3642;outline:none;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;
    border-radius:50%;background:var(--acc);border:2px solid #0d1117;cursor:pointer;
    box-shadow:0 0 6px rgba(79,198,255,.5);}
  input[type=range]::-moz-range-thumb{width:13px;height:13px;border-radius:50%;
    background:var(--acc);border:2px solid #0d1117;cursor:pointer;}
  .seg{display:flex;gap:5px;}
  .seg button{flex:1;padding:7px 0;border:1px solid var(--panel-line);border-radius:6px;
    background:#161e26;color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;
    font-family:Consolas,monospace;transition:all .15s;}
  .seg button:hover{border-color:#3a4c5d;color:var(--txt);}
  .seg button.active{background:#11364a;border-color:var(--acc);color:var(--acc);}
  .ro{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:11.5px;color:var(--sub);}
  .ro i{width:14px;text-align:center;color:#5a7186;font-size:11px;}
  .ro span{flex:1;}
  .ro b{font-family:Consolas,"Cascadia Mono",monospace;color:var(--val);font-size:13px;
    font-weight:600;letter-spacing:.02em;}
  .ro b small{color:var(--sub);font-size:10px;font-weight:400;margin-left:3px;}
  .prog{height:6px;background:#1a232d;border-radius:3px;overflow:hidden;margin-top:4px;}
  .prog>div{height:100%;width:0%;background:linear-gradient(90deg,#2e8fc4,var(--acc));
    border-radius:3px;transition:width .4s;}
  .cam-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
  .cam-grid button{display:flex;align-items:center;gap:7px;padding:7px 10px;
    border:1px solid var(--panel-line);border-radius:6px;background:#161e26;color:var(--txt);
    font-size:11.5px;cursor:pointer;transition:all .15s;}
  .cam-grid button:hover{background:#1f2b37;border-color:#3a4c5d;}
  .cam-grid button i{color:var(--acc);width:13px;text-align:center;font-size:11px;}
  .cam-grid button.wide{grid-column:1 / -1;}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;font-size:12px;
    color:var(--txt);padding:3px 0;}
  .toggle-row i{color:#5a7186;margin-right:7px;font-size:11px;}
  .switch{position:relative;width:36px;height:19px;flex:none;}
  .switch input{opacity:0;width:0;height:0;}
  .switch .knob{position:absolute;inset:0;background:#2a3642;border-radius:10px;cursor:pointer;transition:background .2s;}
  .switch .knob::before{content:"";position:absolute;left:2px;top:2px;width:15px;height:15px;
    border-radius:50%;background:#8aa0b4;transition:transform .2s,background .2s;}
  .switch input:checked + .knob{background:#11364a;}
  .switch input:checked + .knob::before{transform:translateX(17px);background:var(--acc);}
  #help{position:fixed;right:14px;bottom:12px;z-index:10;font-size:10.5px;color:var(--sub);
    background:rgba(13,17,22,.7);border:1px solid var(--panel-line);border-radius:6px;
    padding:6px 11px;letter-spacing:.04em;backdrop-filter:blur(6px);}
  #help i{color:var(--acc);margin:0 3px 0 9px;}
  #help i:first-child{margin-left:0;}
</style>
</head>
<body>
<div id="scene"></div>

<div id="panel">
  <div class="panel-title">
    <i class="fa-solid fa-industry"></i>
    <div>アルミ多条割スリッターライン<small>MULTI-STRAND SLITTING LINE</small></div>
  </div>
  <div class="sec">
    <div class="status-card">
      <div class="led" id="statusLed"></div>
      <div class="status-main">
        <div id="statusText">起動中</div>
        <div class="speed-big"><span id="roSpeed">0</span><small>m/min</small></div>
      </div>
    </div>
  </div>
  <div class="sec">
    <div class="sec-h"><i class="fa-solid fa-sliders"></i>操業操作</div>
    <button class="btn" id="btnRun"><i class="fa-solid fa-stop"></i><span>ライン停止</span></button>
    <div style="margin-top:11px;">
      <div class="slider-row"><span>ライン速度設定</span><b><span id="speedVal">80</span> m/min</b></div>
      <input type="range" id="rngSpeed" min="10" max="180" step="5" value="80">
    </div>
  </div>
  <div class="sec">
    <div class="sec-h"><i class="fa-solid fa-table-columns"></i>スリット条数</div>
    <div class="seg" id="strandGroup">
      <button data-n="2">2</button><button data-n="3">3</button>
      <button data-n="4" class="active">4</button><button data-n="5">5</button><button data-n="6">6</button>
    </div>
    <div class="ro" style="margin-top:7px;">
      <i class="fa-solid fa-ruler-horizontal"></i><span>母材幅 / 条幅</span>
      <b>1200<small>mm</small> / <span id="roStrandW">272</span><small>mm</small></b>
    </div>
  </div>
  <div class="sec">
    <div class="sec-h"><i class="fa-solid fa-gauge-high"></i>計測値</div>
    <div class="ro"><i class="fa-solid fa-arrow-rotate-left"></i><span>アンコイラ残径</span>
      <b><span id="roUnc">2100</span><small>mm</small></b></div>
    <div class="ro"><i class="fa-solid fa-arrow-rotate-right"></i><span>リコイラ巻径</span>
      <b><span id="roRec">560</span><small>mm</small></b></div>
    <div class="ro"><i class="fa-solid fa-gauge"></i><span>ライン張力</span>
      <b><span id="roTen">0</span><small>kN</small></b></div>
    <div class="ro"><i class="fa-solid fa-up-right-and-down-left-from-center"></i><span>通板長(累計)</span>
      <b><span id="roLen">0</span><small>m</small></b></div>
    <div class="ro" style="margin-top:3px;"><i class="fa-solid fa-circle-half-stroke"></i>
      <span>コイル消化率</span><b><span id="roProg">0</span><small>%</small></b></div>
    <div class="prog"><div id="coilProg"></div></div>
  </div>
  <div class="sec">
    <div class="sec-h"><i class="fa-solid fa-video"></i>カメラ・表示</div>
    <div class="cam-grid">
      <button class="wide" data-cam="all"><i class="fa-solid fa-expand"></i>ライン全景</button>
      <button data-cam="unc"><i class="fa-solid fa-arrow-rotate-left"></i>アンコイラ</button>
      <button data-cam="slit"><i class="fa-solid fa-scissors"></i>スリッター</button>
      <button data-cam="loop1"><i class="fa-solid fa-arrows-down-to-line"></i>No.1ルーパー</button>
      <button data-cam="loop2"><i class="fa-solid fa-arrows-down-to-line"></i>No.2ルーパー</button>
      <button data-cam="md"><i class="fa-solid fa-grip-lines"></i>MDロール</button>
      <button data-cam="rec"><i class="fa-solid fa-arrow-rotate-right"></i>リコイラ</button>
    </div>
    <div class="toggle-row" style="margin-top:10px;">
      <span><i class="fa-solid fa-tags"></i>設備名ラベル</span>
      <label class="switch"><input type="checkbox" id="chkLabels" checked><span class="knob"></span></label>
    </div>
    <div class="toggle-row">
      <span><i class="fa-solid fa-hashtag"></i>ロール番号(BOM)</span>
      <label class="switch"><input type="checkbox" id="chkIds"><span class="knob"></span></label>
    </div>
  </div>
</div>

<div id="help">
  <i class="fa-solid fa-arrows-up-down-left-right"></i>左ドラッグ:回転
  <i class="fa-solid fa-magnifying-glass-plus"></i>ホイール:ズーム
  <i class="fa-solid fa-hand"></i>右ドラッグ:移動
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
"use strict";
(function(){

/* =========================================================
 * ライン緒元 / レイアウト(横からの概略図に準拠・1単位=1m)
 * =======================================================*/
const PL      = 2.2;              // パスライン高さ [m]
const STRIP_W = 1.20;             // 母材幅 [m]
const TRIM_W  = 0.05, EFF_W = STRIP_W - TRIM_W*2;
const UNC_X = -31.0, UNC_Y = PL;  // アンコイラ中心
const REC_X =  24.5, REC_Y = PL;  // リコイラ中心
const SLIT_X = 0;                 // スリッターヘッド
const R_MANDREL = 0.20;
const RU_MAX = 1.05, RU_MIN = 0.40;
const RR_MIN = 0.30, RR_MAX = 1.00;
const H_VIS  = 0.020, UV_SCALE = 2.0;
const ACCEL = 0.40, DECEL = 0.55;
const ENTRY_N = 150, STRAND_N = 180, TRIM_N = 26;
const d2r = (mm)=> mm/2000;       // 直径[mm] → 半径[m]

const st = {
  v:0, target:80/60, paused:false, state:"RUN", tChange:0, swapped:false,
  ru:RU_MAX, rr:RR_MIN, rsL:0.13, rsR:0.13, len:0, N:4, texOfs:0,
};

/* =========================================================
 * レンダラ / シーン / カメラ
 * =======================================================*/
const container=document.getElementById("scene");
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true; renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping; renderer.toneMappingExposure=1.18;
container.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1b222b);
scene.fog=new THREE.Fog(0x1b222b,70,150);
const camera=new THREE.PerspectiveCamera(48,window.innerWidth/window.innerHeight,0.1,400);

(function buildEnvironment(){
  const env=new THREE.Scene();
  const sg=new THREE.SphereGeometry(70,24,16);
  const pos=sg.attributes.position, colors=new Float32Array(pos.count*3);
  const cTop=new THREE.Color(0xcfe2f4), cBot=new THREE.Color(0x39404a), tmp=new THREE.Color();
  for(let i=0;i<pos.count;i++){const t=THREE.MathUtils.clamp(pos.getY(i)/70*0.5+0.5,0,1);
    tmp.copy(cBot).lerp(cTop,t); colors[i*3]=tmp.r; colors[i*3+1]=tmp.g; colors[i*3+2]=tmp.b;}
  sg.setAttribute("color",new THREE.BufferAttribute(colors,3));
  env.add(new THREE.Mesh(sg,new THREE.MeshBasicMaterial({side:THREE.BackSide,vertexColors:true})));
  const lampMat=new THREE.MeshBasicMaterial({color:0xffffff});
  for(let x=-34;x<=28;x+=8) for(const z of [-6,6]){
    const lamp=new THREE.Mesh(new THREE.PlaneGeometry(5,1.6),lampMat);
    lamp.position.set(x,34,z); lamp.rotation.x=Math.PI/2; env.add(lamp);
  }
  const pm=new THREE.PMREMGenerator(renderer);
  scene.environment=pm.fromScene(env,0.04).texture; pm.dispose();
})();

scene.add(new THREE.HemisphereLight(0xbcd6ef,0x3a3832,0.85));
const sun=new THREE.DirectionalLight(0xfff3e2,1.4);
sun.position.set(12,26,12); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-40; sun.shadow.camera.right=40;
sun.shadow.camera.top=20; sun.shadow.camera.bottom=-12;
sun.shadow.camera.far=80; sun.shadow.bias=-0.0006;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xb8d2ee,0.35); fill.position.set(-16,12,-12); scene.add(fill);
const back=new THREE.DirectionalLight(0xdfe9f4,0.22); back.position.set(4,10,-18); scene.add(back);

/* =========================================================
 * カメラコントロール
 * =======================================================*/
class OrbitCam{
  constructor(cam,dom){
    this.cam=cam; this.dom=dom; this.target=new THREE.Vector3(-3,2,0);
    this.r=40; this.theta=0.55; this.phi=1.14;
    this.minR=4; this.maxR=100; this.minPhi=0.12; this.maxPhi=1.52;
    this._btn=-1; this._px=0; this._py=0; this.tween=null;
    dom.addEventListener("pointerdown",e=>{this._btn=e.button;this._px=e.clientX;this._py=e.clientY;dom.setPointerCapture(e.pointerId);});
    dom.addEventListener("pointermove",e=>{
      if(this._btn<0)return; const dx=e.clientX-this._px,dy=e.clientY-this._py; this._px=e.clientX;this._py=e.clientY;
      if(this._btn===0){this.theta-=dx*0.005;this.phi=THREE.MathUtils.clamp(this.phi-dy*0.005,this.minPhi,this.maxPhi);}
      else this._pan(dx,dy); this.tween=null;});
    dom.addEventListener("pointerup",()=>{this._btn=-1;});
    dom.addEventListener("wheel",e=>{e.preventDefault();this.r=THREE.MathUtils.clamp(this.r*(e.deltaY>0?1.1:0.9),this.minR,this.maxR);this.tween=null;},{passive:false});
    dom.addEventListener("contextmenu",e=>e.preventDefault());
  }
  _pan(dx,dy){const s=this.r*0.0012;
    const fwd=new THREE.Vector3().subVectors(this.target,this.cam.position).normalize();
    const right=new THREE.Vector3().crossVectors(fwd,this.cam.up).normalize();
    const up=new THREE.Vector3().crossVectors(right,fwd).normalize();
    this.target.addScaledVector(right,-dx*s).addScaledVector(up,dy*s);}
  flyTo(tx,ty,tz,r,theta,phi){this.tween={k:0,
    f:{x:this.target.x,y:this.target.y,z:this.target.z,r:this.r,th:this.theta,ph:this.phi},
    t:{x:tx,y:ty,z:tz,r:r,th:theta,ph:phi}};}
  update(dt){
    if(this.tween){const tw=this.tween; tw.k=Math.min(tw.k+dt/0.9,1);
      const e=tw.k<0.5?2*tw.k*tw.k:1-Math.pow(-2*tw.k+2,2)/2;
      this.target.set(THREE.MathUtils.lerp(tw.f.x,tw.t.x,e),THREE.MathUtils.lerp(tw.f.y,tw.t.y,e),THREE.MathUtils.lerp(tw.f.z,tw.t.z,e));
      this.r=THREE.MathUtils.lerp(tw.f.r,tw.t.r,e); this.theta=THREE.MathUtils.lerp(tw.f.th,tw.t.th,e); this.phi=THREE.MathUtils.lerp(tw.f.ph,tw.t.ph,e);
      if(tw.k>=1)this.tween=null;}
    const sp=Math.sin(this.phi);
    this.cam.position.set(this.target.x+this.r*sp*Math.sin(this.theta),this.target.y+this.r*Math.cos(this.phi),this.target.z+this.r*sp*Math.cos(this.theta));
    this.cam.lookAt(this.target);}
}
const controls=new OrbitCam(camera,renderer.domElement);

/* =========================================================
 * テクスチャ / マテリアル
 * =======================================================*/
function canvasTex(w,h,draw){const c=document.createElement("canvas");c.width=w;c.height=h;draw(c.getContext("2d"),w,h);
  const t=new THREE.CanvasTexture(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.anisotropy=renderer.capabilities.getMaxAnisotropy();t.encoding=THREE.sRGBEncoding;return t;}
const stripTex=canvasTex(512,128,(g,w,h)=>{g.fillStyle="#d8dde2";g.fillRect(0,0,w,h);
  for(let i=0;i<90;i++){const y=Math.random()*h,len=40+Math.random()*200;
    g.fillStyle=`rgba(${Math.random()<0.5?"90,100,110":"255,255,255"},${0.03+Math.random()*0.06})`;g.fillRect(Math.random()*w,y,len,1+Math.random()*1.5);}
  for(let i=0;i<5;i++){const x=Math.random()*w;const gr=g.createLinearGradient(x-22,0,x+22,0);
    gr.addColorStop(0,"rgba(255,255,255,0)");gr.addColorStop(0.5,"rgba(255,255,255,0.10)");gr.addColorStop(1,"rgba(255,255,255,0)");g.fillStyle=gr;g.fillRect(x-22,0,44,h);}});
const coilCapTex=canvasTex(512,512,(g,w,h)=>{const cx=w/2,cy=h/2;g.fillStyle="#c2c8cf";g.fillRect(0,0,w,h);
  for(let r=8;r<w/2;r+=5){g.strokeStyle=`rgba(70,80,90,${0.10+Math.random()*0.14})`;g.lineWidth=1.4;g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.stroke();}
  g.strokeStyle="rgba(60,70,80,0.55)";g.lineWidth=3.5;g.beginPath();g.moveTo(cx,cy);g.lineTo(w,cy);g.stroke();});
const rollCapTex=canvasTex(256,256,(g,w,h)=>{const cx=w/2,cy=h/2;g.fillStyle="#8d949c";g.fillRect(0,0,w,h);
  g.fillStyle="#5a6068";g.beginPath();g.arc(cx,cy,28,0,Math.PI*2);g.fill();g.strokeStyle="rgba(50,56,64,0.7)";g.lineWidth=9;
  for(let i=0;i<4;i++){const a=i*Math.PI/2;g.beginPath();g.moveTo(cx,cy);g.lineTo(cx+Math.cos(a)*w/2,cy+Math.sin(a)*w/2);g.stroke();}
  g.strokeStyle="rgba(255,255,255,0.25)";g.lineWidth=4;g.beginPath();g.arc(cx,cy,w/2-12,0,Math.PI*2);g.stroke();});
const concreteTexBase=canvasTex(256,256,(g,w,h)=>{g.fillStyle="#79808a";g.fillRect(0,0,w,h);
  for(let i=0;i<900;i++){g.fillStyle=`rgba(${Math.random()<0.5?"50,54,60":"175,182,190"},${0.04+Math.random()*0.05})`;g.fillRect(Math.random()*w,Math.random()*h,1+Math.random()*2,1+Math.random()*2);}
  g.strokeStyle="rgba(45,50,58,0.5)";g.lineWidth=2;g.strokeRect(0,0,w,h);});
function concreteTex(rx,ry){const t=concreteTexBase.clone();t.needsUpdate=true;t.repeat.set(rx,ry);return t;}
const hazardTex=canvasTex(128,128,(g,w,h)=>{g.fillStyle="#16191d";g.fillRect(0,0,w,h);g.fillStyle="#e8b324";
  for(let x=-h;x<w+h;x+=44){g.beginPath();g.moveTo(x,0);g.lineTo(x+22,0);g.lineTo(x+22-h,h);g.lineTo(x-h,h);g.closePath();g.fill();}});

const M={
  strip:new THREE.MeshStandardMaterial({map:stripTex,color:0xeef2f5,metalness:0.45,roughness:0.5,side:THREE.DoubleSide}),

function tangentPoint(cx,cy,Rr,px,py,sign){const dx=px-cx,dy=py-cy,d=Math.hypot(dx,dy)||1e-4;
  const base=Math.atan2(dy,dx),off=Math.acos(THREE.MathUtils.clamp(Rr/d,-1,1)),a=base+sign*off;

class Ribbon{
  constructor(width,count,material){this.w=width;this.n=count;
    const g=new THREE.BufferGeometry();
    this.pos=new Float32Array(count*6);this.nor=new Float32Array(count*6);this.uv=new Float32Array(count*4);
    const idx=[];for(let i=0;i<count-1;i++){const a=i*2;idx.push(a,a+1,a+2,a+1,a+3,a+2);}
    g.setIndex(idx);
    g.setAttribute("position",new THREE.BufferAttribute(this.pos,3).setUsage(THREE.DynamicDrawUsage));
    g.setAttribute("normal",new THREE.BufferAttribute(this.nor,3).setUsage(THREE.DynamicDrawUsage));
    g.setAttribute("uv",new THREE.BufferAttribute(this.uv,2).setUsage(THREE.DynamicDrawUsage));
    this.geo=g;this.mesh=new THREE.Mesh(g,material);this.mesh.castShadow=true;this.mesh.frustumCulled=false;scene.add(this.mesh);}
  update(pts){const h=this.w/2;let s=0;const n=Math.min(pts.length,this.n);let pnx=0,pny=1;
    for(let i=0;i<n;i++){const p=pts[i];const pp=pts[Math.max(i-1,0)],pn=pts[Math.min(i+1,n-1)];
      let tx=pn.x-pp.x,ty=pn.y-pp.y;const tl=Math.hypot(tx,ty);let nx,ny;
      if(tl<1e-5){nx=pnx;ny=pny;}else{tx/=tl;ty/=tl;nx=-ty;ny=tx;pnx=nx;pny=ny;}
      if(i>0)s+=p.distanceTo(pts[i-1]);const o=i*6;
      this.pos[o]=p.x;this.pos[o+1]=p.y;this.pos[o+2]=p.z-h;this.pos[o+3]=p.x;this.pos[o+4]=p.y;this.pos[o+5]=p.z+h;
      this.nor[o]=nx;this.nor[o+1]=ny;this.nor[o+2]=0;this.nor[o+3]=nx;this.nor[o+4]=ny;this.nor[o+5]=0;
      const u=s/UV_SCALE,q=i*4;this.uv[q]=u;this.uv[q+1]=0;this.uv[q+2]=u;this.uv[q+3]=1;}
    this.geo.attributes.position.needsUpdate=true;this.geo.attributes.normal.needsUpdate=true;this.geo.attributes.uv.needsUpdate=true;}
  dispose(){scene.remove(this.mesh);this.geo.dispose();}
}
function samplePolyline(pts,n,out){out=out||[];const lens=[];let total=0;
  for(let i=0;i<pts.length-1;i++){const l=pts[i].distanceTo(pts[i+1]);lens.push(l);total+=l;}
  let seg=0,segStart=0;
  for(let i=0;i<n;i++){const d=total*i/(n-1);
    while(seg<lens.length-1&&d>segStart+lens[seg]){segStart+=lens[seg];seg++;}
    const t=lens[seg]>0?Math.min((d-segStart)/lens[seg],1):0;
    out.push(new THREE.Vector3().lerpVectors(pts[seg],pts[seg+1],t));}
  return out;}

// スリッター(I=スチールシャフトφ98 アーバー + 上下丸刃群)

(function(){housing(SLIT_X,PL+1.1,M.paintDark);

for(let i=0;i<5;i++)roll('R1-'+(i+1),1.4+i*0.6,PL-d2r(98),98,-1,{frame:false});

roll('S1-1',4.8,PL-d2r(94),94,-1,{frame:false});roll('S1-2',5.2,PL-d2r(94),94,-1,{frame:false});roll('S1-3',5.6,PL-d2r(94),94,-1,{frame:false});
const R2pts=[]; (function(){const x0=6.1,x1=11.1,depth=1.6,r=d2r(98);
  for(let i=0;i<11;i++){const x=THREE.MathUtils.lerp(x0,x1,i/10);const t=(x-x0)/(x1-x0);const py=PL-depth*4*t*(1-t);
    roll('R2-'+(i+1),x,py-r,98,-1,{frame:false});R2pts.push(V3(x,py,0));}})();
roll('S2-1',11.8,PL-d2r(80),80,-1,{frame:false});roll('S2-2',12.2,PL-d2r(80),80,-1,{frame:false});roll('S2-3',12.6,PL-d2r(80),80,-1,{frame:false});
// セパ押え / MDミニ前
roll('T1',13.6,PL+0.16,80,1,{frame:false});roll('T2',14.3,PL-d2r(80),80,-1,{frame:false});
// MDロール(上下ピンチ式): V=ミニφ250(ゴムディスク), W=主φ400(ゴムディスク) — 帯は上下間を通板
housing(15.2,PL+1.1); discRoll('V1',15.2,PL+0.16,250,1);discRoll('V2',15.2,PL-0.16,250,-1);
housing(16.8,PL+1.2,M.paintDark); discRoll('W1',16.8,PL+0.22,400,1);discRoll('W2',16.8,PL-0.22,400,-1);
addCylZ(0.18,0.5,M.paintDark,16.8,PL+0.22,-(STRIP_W/2+0.95),scene); // MD駆動モーター
addCylZ(0.18,0.5,M.paintDark,16.8,PL-0.22,-(STRIP_W/2+0.95),scene);
// 出側ピンチ
housing(18.4,PL+0.9); roll('X1',18.4,PL+0.11,200,1);roll('X2',18.4,PL-0.11,200,-1);
// デフロール(上下φ500)
roll('Y2',19.9,PL+0.27,500,1);roll('Y1',20.6,PL-0.27,500,-1);
// テールキャッチャー
roll('Z',22.0,PL+0.10,190,1,{frame:false});

/* =========================================================
 * スリッター丸刃 / セパレーター(条数依存)
 * =======================================================*/
function buildKnives(N){for(const grp of [knifeUp,knifeLo]){while(grp.children.length){const c=grp.children.pop();c.geometry.dispose();grp.remove(c);}}
  addCylZ(0.118,STRIP_W+0.1,M.spacer,0,0,0,knifeUp);addCylZ(0.118,STRIP_W+0.1,M.spacer,0,0,0,knifeLo);
  const sw=EFF_W/N;for(let k=0;k<=N;k++){const zc=-EFF_W/2+k*sw;
    addCylZ(0.18,0.016,M.knife,0,0,zc-0.010,knifeUp,36);addCylZ(0.18,0.016,M.knife,0,0,zc+0.010,knifeLo,36);}}
const sepGroups=[];
function buildSeparators(N){for(const sg of sepGroups){while(sg.g.children.length){const c=sg.g.children.pop();c.geometry.dispose();sg.g.remove(c);}}
  const sw=EFF_W/N;
  for(const sg of sepGroups){for(let k=0;k<=N;k++){const zc=-EFF_W/2+k*sw;addCylZ(0.22,0.012,M.knife,sg.x,PL+0.32,zc,sg.g,28);}}}
(function(){for(const x of [13.0,21.0]){const g=new THREE.Group();scene.add(g);sepGroups.push({x,g});
  addBox(0.16,3.0,0.16,M.frame,x,1.5,-1.3);addBox(0.16,3.0,0.16,M.frame,x,1.5,1.3);addBox(0.2,0.16,2.76,M.yellow,x,3.0,0);
  addCylZ(0.04,STRIP_W+0.8,M.steel,x,PL+0.32,0,scene);}})();

/* =========================================================
 * サイドワインダー(耳屑巻取機・両側)
 * =======================================================*/
function buildScrapWinder(side){const z=2.7*side,x=1.2,y=1.0;
  addBox(0.55,1.0,0.55,M.paintDark,x,0.5,z+0.45*side);addCylZ(0.2,0.32,M.paintDark,x,y,z+0.34*side,scene);
  const g=new THREE.Group();g.position.set(x,y,z);scene.add(g);
  addCylZ(0.1,0.44,M.steel,0,0,0,g);addCylZ(0.42,0.03,rollMats(),0,0,-0.21,g,32);addCylZ(0.42,0.03,rollMats(),0,0,0.21,g,32);
  const coil=addCylZ(1,0.32,coilMats(),0,0,0,g,32);spin(g,side>0?()=>st.rsR:()=>st.rsL,-1);return{coil,x,y,z};}
const scrapR=buildScrapWinder(1),scrapL=buildScrapWinder(-1);

/* =========================================================
 * ストリップ(リボン)
 * =======================================================*/
const entryRibbon=new Ribbon(STRIP_W-0.01,ENTRY_N,M.strip);
let strandRibbons=[],strandZ=[];
const trimRibbonR=new Ribbon(TRIM_W-0.006,TRIM_N,M.strip),trimRibbonL=new Ribbon(TRIM_W-0.006,TRIM_N,M.strip);
function buildStrands(N){for(const r of strandRibbons)r.dispose();strandRibbons=[];strandZ=[];
  const sw=EFF_W/N;for(let i=0;i<N;i++){strandZ.push(-EFF_W/2+(i+0.5)*sw);strandRibbons.push(new Ribbon(sw-0.014,STRAND_N,M.strip));}}
const TOP=(id)=>{const o=R[id];return V3(o.x,o.y+o.r,0);};
const NIP=(id,zc)=>V3(R[id].x,PL,zc||0);

const _e=[];
function updateEntryRibbon(){const raw=_e;raw.length=0;
  // アンコイラ外周からの接線で払い出し
  const A=R.A,Tt=tangentPoint(UNC_X,UNC_Y,st.ru,A.x,A.y+A.r,+1);
  for(let i=0;i<6;i++){const a=THREE.MathUtils.lerp(Tt.a+0.8,Tt.a,i/5);raw.push(V3(UNC_X+(st.ru+0.004)*Math.cos(a),UNC_Y+(st.ru+0.004)*Math.sin(a),0));}
  raw.push(TOP('A'));raw.push(TOP('B'));raw.push(NIP('C1'));
  raw.push(V3(R['H1-1'].x,PL,0));raw.push(V3(R['H1-3'].x,PL,0));
  raw.push(NIP('J2'));raw.push(V3(R['K1-2'].x,PL,0));
  for(const p of H2pts)raw.push(p.clone());                 // No.1ルーパー垂み
  raw.push(V3(R['K2-2'].x,PL,0));raw.push(NIP('L1'));raw.push(V3(R.M.x,PL,0));raw.push(NIP('N1'));raw.push(TOP('Q'));
  raw.push(V3(SLIT_X,PL,0));
  const out=[];samplePolyline(raw,ENTRY_N,out);entryRibbon.update(out);}

const _sraw=[],_sout=[];
function updateStrandRibbon(rib,zc){const raw=_sraw;raw.length=0;
  raw.push(V3(SLIT_X,PL,zc));
  raw.push(V3(R['R1-1'].x,PL,zc));raw.push(V3(R['R1-5'].x,PL,zc));raw.push(V3(R['S1-2'].x,PL,zc));
  for(const p of R2pts)raw.push(V3(p.x,p.y,zc));            // No.2ルーパー垂み
  raw.push(V3(R['S2-2'].x,PL,zc));raw.push(V3(R.T1.x,PL,zc));
  raw.push(V3(R.V1.x,PL,zc));raw.push(V3(R.W1.x,PL,zc));raw.push(V3(R.X1.x,PL,zc)); // MD/出側ピンチ ニップ
  raw.push(V3(R.Y2.x,R.Y2.y+R.Y2.r,zc));raw.push(V3(R.Y1.x,R.Y1.y-R.Y1.r,zc));     // デフS字
  raw.push(V3(R.Z.x,R.Z.y+R.Z.r,zc));
  const Tt=tangentPoint(REC_X,REC_Y,st.rr,R.Z.x,R.Z.y,-1);  // リコイラ外周へ接線巻取り
  raw.push(V3(Tt.x,Tt.y,zc));
  for(let j=1;j<=4;j++){const a=THREE.MathUtils.lerp(Tt.a,Tt.a-0.7,j/4);raw.push(V3(REC_X+(st.rr+0.004)*Math.cos(a),REC_Y+(st.rr+0.004)*Math.sin(a),zc));}
  _sout.length=0;samplePolyline(raw,STRAND_N,_sout);rib.update(_sout);}

const _tcR=new THREE.CatmullRomCurve3([V3(0,0,0),V3(0,0,0),V3(0,0,0),V3(0,0,0),V3(0,0,0)]);
const _tcL=new THREE.CatmullRomCurve3([V3(0,0,0),V3(0,0,0),V3(0,0,0),V3(0,0,0),V3(0,0,0)]);
function updateTrim(rib,curve,side,rs){const z0=(EFF_W/2+TRIM_W/2)*side;const sw=scrapR;
  const ap=V3(0.85,1.2,sw.z-0.5*side);const Tt=tangentPoint(sw.x,sw.y,rs,ap.x,ap.y,+1);
  curve.points[0].set(SLIT_X,PL,z0);curve.points[1].set(0.3,PL-0.05,z0+0.3*side);
  curve.points[2].set(0.7,1.5,sw.z*0.55);curve.points[3].set(ap.x,ap.y,sw.z-0.18*side);curve.points[4].set(Tt.x,Tt.y,sw.z);
  rib.update(curve.getPoints(TRIM_N-1));}

/* =========================================================
 * ラベル(設備名)

makeLabel("アンコイラ",UNC_X,PL+1.7,0);
makeLabel("入側ピンチ",-26.9,PL+1.3,0);

makeLabel("スリッター前ピンチ",-5.1,PL+1.35,0);
makeLabel("スリッターヘッド",SLIT_X,PL+1.55,0);
makeLabel("サイドワインダー(耳屑)",1.2,2.1,2.7);
makeLabel("No.2ルーパー",8.6,PL+0.5,0);
makeLabel("セパレーター",13.0,PL+1.45,0);
makeLabel("MDロール(上下ピンチ)",16.0,PL+1.65,0);
makeLabel("出側ピンチ",18.4,PL+1.3,0);
makeLabel("デフロール",20.2,PL+1.5,0);

/* =========================================================
 * 条数依存部の再構築
 * =======================================================*/
function rebuildStrandDependent(N){st.N=N;buildKnives(N);buildSeparators(N);buildRecCoils(N);buildStrands(N);
  document.getElementById("roStrandW").textContent=Math.round(EFF_W/N*1000);}
rebuildStrandDependent(4);

/* =========================================================
 * UI
 * =======================================================*/
const ui={led:document.getElementById("statusLed"),status:document.getElementById("statusText"),
  roSpeed:document.getElementById("roSpeed"),roUnc:document.getElementById("roUnc"),roRec:document.getElementById("roRec"),
  roTen:document.getElementById("roTen"),roLen:document.getElementById("roLen"),roProg:document.getElementById("roProg"),
  prog:document.getElementById("coilProg"),btnRun:document.getElementById("btnRun")};
ui.btnRun.addEventListener("click",()=>{st.paused=!st.paused;
  ui.btnRun.innerHTML=st.paused?'<i class="fa-solid fa-play"></i><span>ライン起動</span>':'<i class="fa-solid fa-stop"></i><span>ライン停止</span>';
  ui.btnRun.classList.toggle("running",st.paused);});
const rng=document.getElementById("rngSpeed");
rng.addEventListener("input",()=>{document.getElementById("speedVal").textContent=rng.value;st.target=rng.value/60;});
document.getElementById("strandGroup").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
  document.querySelectorAll("#strandGroup button").forEach(x=>x.classList.remove("active"));b.classList.add("active");rebuildStrandDependent(parseInt(b.dataset.n,10));});
const CAM={all:[-3,2,0,42,0.55,1.14],unc:[-30,2.3,0,9,0.72,1.10],slit:[0,2.3,0,7,0.62,1.0],
  loop1:[-12,1.2,0,9,0.5,0.98],loop2:[8.6,1.1,0,9,0.5,0.98],md:[16.2,2.2,0,7,0.66,1.02],rec:[24,2.3,0,9,0.62,1.08]};
document.querySelectorAll("[data-cam]").forEach(b=>b.addEventListener("click",()=>controls.flyTo(...CAM[b.dataset.cam])));
document.getElementById("chkLabels").addEventListener("change",e=>{labelGroup.visible=e.target.checked;});
document.getElementById("chkIds").addEventListener("change",e=>{idLabelGroup.visible=e.target.checked;});

/* =========================================================
 * 状態機械・アニメーション
 * =======================================================*/
function easeIO(t){return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;}
function stepLine(dt){const tgt=(st.paused||st.state!=="RUN")?0:st.target;
  st.v+=THREE.MathUtils.clamp(tgt-st.v,-DECEL*dt,ACCEL*dt);if(Math.abs(st.v)<0.004&&tgt===0)st.v=0;
  if(st.v>0){st.len+=st.v*dt;
    st.ru=Math.max(RU_MIN-0.01,st.ru-st.v*H_VIS/(2*Math.PI*st.ru)*dt);
    st.rr=Math.min(RR_MAX+0.01,st.rr+st.v*H_VIS/(2*Math.PI*st.rr)*dt);
    const ds=st.v*0.004/(2*Math.PI);st.rsR=Math.min(0.42,st.rsR+ds/st.rsR*dt);st.rsL=Math.min(0.42,st.rsL+ds/st.rsL*dt);
    st.texOfs-=st.v*dt/UV_SCALE;stripTex.offset.x=st.texOfs;}
  if(st.state==="RUN"&&(st.ru<=RU_MIN||st.rr>=RR_MAX))st.state="DECEL";
  if(st.state==="DECEL"&&st.v<=0.004){st.state="CHANGE";st.tChange=0;st.swapped=false;}
  if(st.state==="CHANGE"){st.tChange+=dt;const t=st.tChange;
    if(t<1.4)coilCar.position.x=THREE.MathUtils.lerp(REC_X+4.2,REC_X,easeIO(t/1.4));
    else if(t<2.4){coilCar.position.x=REC_X;if(!st.swapped&&t>1.9){st.ru=RU_MAX;st.rr=RR_MIN;st.rsL=0.13;st.rsR=0.13;st.swapped=true;}}
    else if(t<3.8)coilCar.position.x=THREE.MathUtils.lerp(REC_X,REC_X+4.2,easeIO((t-2.4)/1.4));
    else{coilCar.position.x=REC_X+4.2;st.state="RUN";}}}
function updateGeometry(){
  uncGroup.coil.scale.set(st.ru,st.ru,1);for(const c of recCoils)c.scale.set(st.rr,st.rr,1);
  scrapR.coil.scale.set(st.rsR,st.rsR,1);scrapL.coil.scale.set(st.rsL,st.rsL,1);
  updateEntryRibbon();
  for(let i=0;i<strandRibbons.length;i++)updateStrandRibbon(strandRibbons[i],strandZ[i]);
  updateTrim(trimRibbonR,_tcR,1,st.rsR);updateTrim(trimRibbonL,_tcL,-1,st.rsL);}
function updateSpinners(dt){if(st.v<=0)return;for(const s of spinners){const r=(typeof s.r==="function")?s.r():s.r;s.obj.rotation.z+=s.dir*(st.v/r)*dt;}}
let uiT=0;
function updateHUD(dt){uiT+=dt;if(uiT<0.12)return;uiT=0;
  ui.roSpeed.textContent=Math.round(st.v*60);ui.roUnc.textContent=Math.round(st.ru*2000);ui.roRec.textContent=Math.round(st.rr*2000);
  ui.roTen.textContent=(st.v>0.004?(8+st.v*9).toFixed(1):"0.0");ui.roLen.textContent=Math.round(st.len).toLocaleString();
  const prog=THREE.MathUtils.clamp((RU_MAX*RU_MAX-st.ru*st.ru)/(RU_MAX*RU_MAX-RU_MIN*RU_MIN),0,1);
  ui.roProg.textContent=Math.round(prog*100);ui.prog.style.width=(prog*100).toFixed(1)+"%";
  let text,cls;const tgt=(st.paused||st.state!=="RUN")?0:st.target;
  if(st.state==="CHANGE"){text="コイル交換中";cls="info";}else if(st.state==="DECEL"){text="コイル交換準備 ─ 減速中";cls="warn";}
  else if(st.paused&&st.v<=0.004){text="ライン停止";cls="stop";}else if(st.v<tgt-0.01){text="加速中";cls="warn";}
  else if(st.v>tgt+0.01){text="減速中";cls="warn";}else if(st.v>0.004){text="定常運転中";cls="ok";}else{text="ライン停止";cls="stop";}
  ui.status.textContent=text;ui.led.className="led "+cls;}
const clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);
  stepLine(dt);updateSpinners(dt);updateGeometry();updateHUD(dt);controls.update(dt);renderer.render(scene,camera);}
window.addEventListener("resize",()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
window.addEventListener("keydown",e=>{if(e.code==="Space"&&document.activeElement.tagName!=="INPUT"){e.preventDefault();ui.btnRun.click();}});
animate();
})();
</script>
